services:
  - type: worker
    name: telegram-campaign
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: >
      python3 scripts/run_campaign.py
      --name impactguru_v1
      --start +919000000000
      --link https://www.impactguru.com/fundraiser/help-bijjarapu-shiva
      --schedule
      --batch-size 10
      --min-delay 45
      --max-delay 120
      --batch-delay 3600
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: PHONE_NUMBER
        sync: false
      - key: SESSION_STRING
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: campaign-db
          property: connectionString

databases:
  - name: campaign-db
    plan: free
